name: Build ZenOptimize

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle 8.11
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11"

      - name: Build mod
        id: build
        run: |
          gradle build --stacktrace 2>&1 | tee /tmp/build_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Dump build errors to summary
        if: failure()
        run: |
          echo "## Build Output (last 150 lines)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -150 /tmp/build_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Capture mod version
        id: mod_version
        if: success()
        run: |
          VERSION=$(grep "^mod_version" gradle.properties | cut -d= -f2 | tr -d " ")
          MC_VERSION=$(grep "^minecraft_version" gradle.properties | cut -d= -f2 | tr -d " ")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "mc_version=$MC_VERSION" >> $GITHUB_OUTPUT

      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: zenoptimize-${{ steps.mod_version.outputs.version }}+mc${{ steps.mod_version.outputs.mc_version }}
          path: build/libs/*.jar
          if-no-files-found: error

      - name: Create Release (on tag)
        if: success() && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/*.jar
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
