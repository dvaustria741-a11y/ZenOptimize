name: Build ZenOptimize

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle 8.11
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11"

      - name: Build mod
        run: |
          set -o pipefail
          gradle build --stacktrace 2>&1 | tee /tmp/build_output.txt

      - name: Upload error log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-error-log
          path: /tmp/build_output.txt
          if-no-files-found: warn

      - name: Commit error log to repo
        if: failure()
        run: |
          mkdir -p .ci-logs
          cp /tmp/build_output.txt .ci-logs/last-build-error.log
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .ci-logs/last-build-error.log
          git commit -m "ci: record build error log [skip ci]" || echo "no changes to commit"
          git push

      - name: Capture mod version
        id: mod_version
        if: success()
        run: |
          VERSION=$(grep "^mod_version" gradle.properties | cut -d= -f2 | tr -d " ")
          MC_VERSION=$(grep "^minecraft_version" gradle.properties | cut -d= -f2 | tr -d " ")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "mc_version=$MC_VERSION" >> $GITHUB_OUTPUT

      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: zenoptimize-${{ steps.mod_version.outputs.version }}+mc${{ steps.mod_version.outputs.mc_version }}
          path: build/libs/*.jar
          if-no-files-found: error

      - name: Create Release (on tag)
        if: success() && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/*.jar
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
