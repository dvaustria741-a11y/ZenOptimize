name: Build ZenOptimize

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      # System Gradle on runners is 9.x which breaks fabric-loom 1.7 (ProblemReporter API mismatch)
      # Download Gradle 8.8 explicitly and put it first on PATH
      - name: Install Gradle 8.8
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.8-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle-install
          echo "/tmp/gradle-install/gradle-8.8/bin" >> $GITHUB_PATH

      - name: Generate Gradle Wrapper (Gradle 8.8)
        run: gradle wrapper --gradle-version 8.8 --distribution-type bin

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build mod
        run: ./gradlew build --stacktrace

      - name: Capture mod version
        id: mod_version
        run: |
          VERSION=$(grep "^mod_version" gradle.properties | cut -d= -f2 | tr -d " ")
          MC_VERSION=$(grep "^minecraft_version" gradle.properties | cut -d= -f2 | tr -d " ")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "mc_version=$MC_VERSION" >> $GITHUB_OUTPUT

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: zenoptimize-${{ steps.mod_version.outputs.version }}+mc${{ steps.mod_version.outputs.mc_version }}
          path: build/libs/*.jar
          if-no-files-found: error

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/*.jar
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
